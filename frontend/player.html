<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000000; padding: 0; color: #ff0000; }

        .player-layout { display: flex; gap: 0; width: 100%; }
        .video-side { flex: 3; border: 2px solid #ff0000; }
        .gauge-side {
            flex: 1; min-width: 160px;
            display: flex; flex-direction: column; align-items: center; gap: 0;
            padding-top: 0; border: 2px solid #ff0000; border-left: none;
        }

        .gauge-wrap { position: relative; width: 160px; height: 95px; overflow: hidden; }
        .gauge-svg { width: 160px; height: 95px; }
        .gauge-bg-arc { fill: none; stroke: #ff0000; stroke-width: 14; }
        .gauge-fill-arc {
            fill: none; stroke-width: 14; stroke: #000000;
        }
        .gauge-pct { font-size: 32px; font-weight: 700; fill: #ff0000 !important; }
        .gauge-lbl { font-size: 12px; font-weight: 600; fill: #ff0000 !important; }
        .gauge-title { font-size: 13px; font-weight: 700; color: #ff0000; text-align: center; }

        .ctrl-row { display: flex; gap: 0; margin-top: 0; flex-wrap: wrap; border-top: 2px solid #ff0000; }
        .ctrl-btn {
            flex: 1; min-width: 65px; padding: 8px; color: #ff0000; border: 1px solid #ff0000;
            background: #000000 !important;
            cursor: pointer; font-size: 11px; font-weight: 600;
            text-align: center; border-radius: 0;
        }
        .ctrl-btn:hover { background: #ff0000 !important; color: #000000; }

        .status-bar {
            padding: 5px; font-size: 0.75rem; color: #ff0000;
            background: #000000; border-top: 2px solid #ff0000;
        }
        .warn-box {
            display: none; padding: 5px; text-align: center;
            font-size: 0.78rem; font-weight: 600; width: 100%; border-top: 2px solid #ff0000;
            background: #000000 !important; color: #ff0000 !important;
        }
        #player-wrap {
            overflow: hidden; background: #000000;
        }
        .summary-overlay {
            display: none; padding: 10px;
            background: #000000; color: #ff0000; font-size: 0.9rem;
            line-height: 1.5; border-top: 2px solid #ff0000;
        }
        .summary-overlay h3 {
            margin: 0 0 5px 0; font-size: 1.15rem; color: #ff0000;
            border-bottom: 1px solid #ff0000; padding-bottom: 5px;
        }
        .summary-overlay strong, .summary-overlay em { color: #ff0000; }
    </style>
</head>
<body>
    <div class="player-layout">
        <div class="video-side">
            <div id="player-wrap">
                <div id="yt-player"></div>
            </div>

            <div class="ctrl-row">
                <button onclick="doPlay()" class="ctrl-btn" id="btn-play"
                    > Play</button>
                <button onclick="doPause()" class="ctrl-btn" id="btn-pause"
                    > Pause</button>
                <button onclick="doRewind()" class="ctrl-btn" id="btn-rw"
                    > −10s</button>
                <button onclick="doSkip()" class="ctrl-btn" id="btn-ff"
                    > +30s</button>
                <button onclick="doSlow()" class="ctrl-btn" id="btn-slow"
                    > 0.75×</button>
                <button onclick="doNormal()" class="ctrl-btn" id="btn-norm"
                    >1× Normal</button>
                <button onclick="doFast()" class="ctrl-btn" id="btn-fast"
                    > 2×</button>
            </div>

            <div class="status-bar" id="status"> Loading YouTube player...</div>
            <div class="summary-overlay" id="summaryBox">
                <h3> Video Summary</h3>
                <div id="summaryContent"></div>
            </div>
        </div>

        <div class="gauge-side">
            <div class="gauge-title">Video Fatigue</div>
            <div class="gauge-wrap">
                <svg class="gauge-svg" viewBox="0 0 160 90">
                    <!-- Semicircle background arc -->
                    <path d="M 15 80 A 65 65 0 0 1 145 80" class="gauge-bg-arc"/>
                    <!-- Semicircle fill arc -->
                    <path d="M 15 80 A 65 65 0 0 1 145 80" class="gauge-fill-arc" id="gaugeFill"
                        stroke="#000000"
                        stroke-dasharray="204"
                        stroke-dashoffset="204"/>
                    <!-- Percentage text -->
                    <text x="80" y="65" class="gauge-pct" text-anchor="middle" id="gaugeVal"
                        fill="#333">0%</text>
                    <!-- Label text -->
                    <text x="80" y="82" class="gauge-lbl" text-anchor="middle" id="gaugeLbl"
                        fill="#888">ENGAGED</text>
                </svg>
            </div>
            <div class="warn-box" id="warnBox"></div>
        </div>
    </div>

    <!-- YouTube IFrame API -->
    <script>
        // Read params from URL
        var params = new URLSearchParams(window.location.search);
        var VIDEO_ID = params.get('v') || '';
        var SESSION_ID = params.get('sid') || '';
        var API_URL = params.get('api') || 'http://localhost:8000';

        var player = null;
        var currentRate = 1.0;
        var eventCount = 0;
        var gaugeEl = document.getElementById('gaugeFill');
        var valEl = document.getElementById('gaugeVal');
        var lblEl = document.getElementById('gaugeLbl');
        var statusEl = document.getElementById('status');
        var warnEl = document.getElementById('warnBox');
        var summaryBox = document.getElementById('summaryBox');
        var summaryContent = document.getElementById('summaryContent');

        // Semicircle arc length = PI * radius = PI * 65 ≈ 204
        var arcLength = 204;

        // Local fatigue tracking for instant visual feedback
        var localFatigue = 0.0;
        var summaryShown = false;  // Once true, summary stays static

        // Impact per button — small gradual changes (~5% each)
        var BUTTON_IMPACTS = {
            'play':         -0.03,
            'pause':         0.03,
            'seek_back':     0.02,
            'seek_fwd':      -0.03,
            'speed_slow':    0.02,
            'speed_normal':  0.00,
            'speed_fast':    -0.04
        };

        // 1. Load YouTube IFrame API script
        var tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);

        // 2. YouTube calls this when API is ready
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '340',
                width: '100%',
                videoId: VIDEO_ID,
                playerVars: {
                    'autoplay': 0,
                    'rel': 0,
                    'modestbranding': 1,
                    'enablejsapi': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            statusEl.textContent = ' Player ready — use buttons to control video';
        }

        function onPlayerStateChange(event) {
            if (event.data == 1) {
                sendFatigueEvent('play', 0, player.getPlaybackRate());
            } else if (event.data == 2) {
                sendFatigueEvent('pause', 0, player.getPlaybackRate());
            }
        }

        // ─── Semicircle Gauge ───────────────────────────────────────
        function updateGauge(score, label) {
            var pct = Math.round(score * 100);
            var offset = arcLength - (score * arcLength);
            gaugeEl.style.strokeDashoffset = offset;

            var colors = {'ENGAGED': '#000000', 'NEUTRAL': '#000000', 'STRUGGLING': '#000000', 'FATIGUED': '#000000'};
            gaugeEl.style.stroke = '#000000';
            valEl.textContent = pct + '%';
            lblEl.textContent = label;
            

            if (label === 'STRUGGLING' || label === 'CRITICAL') {
                warnEl.style.display = 'block';
                if (label === 'CRITICAL') {
                    warnEl.style.background = '#ff0000';
                    warnEl.style.color = '#000000';
                    warnEl.textContent = ' High fatigue!';
                } else {
                    warnEl.style.background = '#ff0000';
                    warnEl.style.color = '#000000';
                    warnEl.textContent = ' Slowing down?';
                }
            } else {
                warnEl.style.display = 'none';
            }
        }

        function getLabel(score) {
            if (score < 0.25) return 'ENGAGED';
            if (score < 0.50) return 'NEUTRAL';
            if (score < 0.75) return 'STRUGGLING';
            return 'FATIGUED';
        }

        // Instant local gauge update (before server responds)
        function instantUpdate(buttonType) {
            var impact = BUTTON_IMPACTS[buttonType] || 0;
            localFatigue = Math.max(0, Math.min(1, localFatigue + impact));
            updateGauge(localFatigue, getLabel(localFatigue));
        }

        // ─── Fatigue Event ──────────────────────────────────────────
        function sendFatigueEvent(eventType, seekDelta, rate) {
            eventCount++;
            var pos = player ? Math.floor(player.getCurrentTime()) : 0;
            fetch(API_URL + '/video-interact', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    session_id: SESSION_ID,
                    event_type: eventType,
                    video_id: VIDEO_ID,
                    position_sec: pos,
                    playback_rate: rate || currentRate,
                    seek_delta_sec: seekDelta || 0,
                    topic: ''
                })
            })
            .then(r => r.json())
            .then(data => {
                var fs = data.fatigue_state || {};
                var score = fs.score || 0;
                var label = fs.label || 'ENGAGED';

                // Blend local gauge smoothly toward server (no sudden jumps)
                // 80% local + 20% server = very stable visual
                localFatigue = localFatigue * 0.8 + score * 0.2;
                updateGauge(localFatigue, label);

                var pct = Math.round(score * 100);
                statusEl.textContent = ' Fatigue: ' + pct + '% (' + label + ') | Pos: ' + pos + 's';

                // Show summary ONCE — then keep it static
                if (!summaryShown && data.summary && data.summary.summary_markdown) {
                    summaryShown = true;
                    summaryBox.style.display = 'block';
                    summaryContent.innerHTML = data.summary.summary_markdown
                        .replace(/\n/g, '<br>')
                        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\*(.+?)\*/g, '<em>$1</em>');
                    statusEl.textContent = ' Summary generated! Fatigue: ' + pct + '%';
                }
            })
            .catch(e => {
                statusEl.textContent = ' Backend error: ' + e.message;
            });
        }

        // ─── Button Handlers (DO NOT MODIFY player control logic) ───
        function doPlay() {
            if (!player) return;
            player.playVideo();
            instantUpdate('play');
            statusEl.textContent = ' Playing...';
        }

        function doPause() {
            if (!player) return;
            player.pauseVideo();
            instantUpdate('pause');
            sendFatigueEvent('pause', 0, currentRate);
            statusEl.textContent = ' Paused';
        }

        function doRewind() {
            if (!player) return;
            var t = player.getCurrentTime();
            var newT = Math.max(0, t - 10);
            player.seekTo(newT, true);
            instantUpdate('seek_back');
            sendFatigueEvent('seek', -10, currentRate);
            statusEl.textContent = ' Rewound to ' + Math.floor(newT) + 's';
        }

        function doSkip() {
            if (!player) return;
            var t = player.getCurrentTime();
            var newT = t + 30;
            player.seekTo(newT, true);
            instantUpdate('seek_fwd');
            sendFatigueEvent('seek', 30, currentRate);
            statusEl.textContent = ' Skipped to ' + Math.floor(newT) + 's';
        }

        function doSlow() {
            if (!player) return;
            currentRate = 0.75;
            player.setPlaybackRate(0.75);
            instantUpdate('speed_slow');
            sendFatigueEvent('speed_change', 0, 0.75);
            statusEl.textContent = ' Speed: 0.75×';
        }

        function doNormal() {
            if (!player) return;
            currentRate = 1.0;
            player.setPlaybackRate(1.0);
            instantUpdate('speed_normal');
            sendFatigueEvent('speed_change', 0, 1.0);
            statusEl.textContent = ' Speed: 1×';
        }

        function doFast() {
            if (!player) return;
            currentRate = 2.0;
            player.setPlaybackRate(2.0);
            instantUpdate('speed_fast');
            sendFatigueEvent('speed_change', 0, 2.0);
            statusEl.textContent = ' Speed: 2×';
        }
    </script>
</body>
</html>
